<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>内部网页调试填充器</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>网页调试填充器</h1>
          <p>内部测试专用</p>
        </div>
        <span class="badge">MV3</span>
      </header>

      <section class="form">
        <label class="field">
          <span>目标网址</span>
          <input id="targetUrl" type="url" placeholder="https://example.com/login" autocomplete="off">
        </label>

        <label class="field">
          <span>填充配置</span>
          <textarea id="configText" spellcheck="false"></textarea>
        </label>

        <div class="toolbar">
          <button id="formatConfig" class="secondary" type="button" title="格式化 JSON">格式化</button>
          <button id="fillCurrent" class="secondary" type="button" title="不跳转，直接填充当前标签页">填充当前页</button>
          <button id="startFill" class="primary" type="button" title="打开目标网址并自动填充">打开并填充</button>
        </div>

        <output id="status" class="status" role="status"></output>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
