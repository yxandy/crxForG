<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>网页调试访问器配置</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <h1>网页调试访问器配置</h1>
        <p>Token 和注册密码只保存在当前浏览器本地，不会写入项目文件。</p>
      </header>

      <section class="panel">
        <label class="field">
          <span>mailmanage API 地址</span>
          <input id="apiBaseUrl" type="url" placeholder="https://mailmanage.yxandy.cc.cd" autocomplete="off">
        </label>

        <label class="field">
          <span>NAS 验证码 API 地址</span>
          <input id="nasBaseUrl" type="url" placeholder="http://10.189.111.82:8787" autocomplete="off">
        </label>

        <label class="field">
          <span>Bearer Token</span>
          <input id="token" type="password" placeholder="mailmanage 和 NAS 验证码接口共用此 Token" autocomplete="off">
        </label>

        <label class="field">
          <span>注册密码</span>
          <input id="registrationPassword" type="password" placeholder="用于第九步统一填入密码" autocomplete="off">
        </label>

        <div class="section-title">Sub2API Grok 导入</div>

        <label class="field">
          <span>Sub2API 地址</span>
          <input id="sub2apiBaseUrl" type="url" placeholder="https://sub2api.example.com" autocomplete="off">
        </label>

        <label class="field">
          <span>Sub2API Admin API Key</span>
          <input id="sub2apiAdminApiKey" type="password" placeholder="请求头 x-api-key 使用的管理员 API Key" autocomplete="off">
        </label>

        <label class="field">
          <span>Grok OAuth 回调地址</span>
          <input id="sub2apiGrokRedirectUri" type="url" placeholder="http://127.0.0.1:56121/callback" autocomplete="off">
        </label>

        <label class="field">
          <span>Sub2API 代理 ID</span>
          <input id="sub2apiProxyId" type="number" min="0" step="1" inputmode="numeric" placeholder="不需要代理可留空" autocomplete="off">
        </label>

        <div class="actions">
          <button id="saveOptions" type="button">保存配置</button>
        </div>

        <output id="status" class="status" role="status"></output>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
