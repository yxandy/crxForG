<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>扩展本地测试页</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --panel: #ffffff;
        --text: #20242c;
        --muted: #687386;
        --line: #d9dee8;
        --primary: #1b6ef3;
        --success: #067647;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(720px, calc(100% - 32px));
        margin: 40px auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 14px;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .signup-fields {
        display: none;
      }

      .signup-fields.visible {
        display: grid;
      }

      .email-register svg {
        width: 16px;
        height: 16px;
        margin-right: 8px;
        vertical-align: -3px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 650;
      }

      input,
      select {
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 10px;
        font: inherit;
      }

      button {
        width: 140px;
        height: 40px;
        border: 0;
        border-radius: 8px;
        background: var(--primary);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      button.email-register {
        width: 100%;
        margin-bottom: 14px;
        border: 1px solid #c9d8f2;
        background: #ffffff;
        color: #1b6ef3;
      }

      #result {
        min-height: 24px;
        color: var(--success);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>扩展本地测试页</h1>
      <p>这个页面用于验证内部网页调试访问器。</p>

      <button class="email-register" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail">
          <rect width="20" height="16" x="2" y="4" rx="2"></rect>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
        </svg>
        使用邮箱注册
      </button>

      <form id="debugForm">
        <label class="signup-fields">
          邮箱
          <input data-testid="email" autocomplete="email" type="email" name="email">
        </label>

        <label class="signup-fields">
          验证码
          <input autocomplete="one-time-code" data-input-otp="true" inputmode="text" pattern="^[a-zA-Z0-9]+$" maxlength="6" name="code">
        </label>

        <label>
          用户名
          <input data-crx-fill="username" autocomplete="off">
        </label>

        <label>
          密码
          <input data-auto-fill="password" type="password" autocomplete="off">
        </label>

        <label>
          手机号
          <input name="phone" autocomplete="off">
        </label>

        <label>
          角色
          <select name="role">
            <option value="">请选择</option>
            <option value="admin">管理员</option>
            <option value="tester">测试人员</option>
          </select>
        </label>

        <button type="submit">注册</button>
        <div id="result"></div>
      </form>
    </main>

    <script>
      document.querySelector(".email-register").addEventListener("click", () => {
        document.querySelector(".signup-fields").classList.add("visible");
        document.querySelector("#result").textContent = "已点击邮箱注册";
      });

      document.querySelector("#debugForm").addEventListener("submit", (event) => {
        event.preventDefault();
        document.querySelector("#result").textContent = "注册按钮已点击";
      });
    </script>
  </body>
</html>
